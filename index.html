<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cohort retention curve</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root{
    --ink:#12130f;--muted:#6f7268;--faint:#9a9d92;
    --line:rgba(18,19,15,0.12);--bg:#f6f5ef;--card:#fff;
    --accent:#2f6d4f;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.55;padding:28px 16px;}
  .wrap{max-width:960px;margin:0 auto;}
  h1{font-size:21px;font-weight:650;margin:0 0 2px;letter-spacing:-0.015em;}
  .sub{font-size:13px;color:var(--muted);margin:0 0 20px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:18px;}
  button{font:inherit;font-size:13px;font-weight:550;padding:8px 16px;border-radius:9px;border:1px solid var(--line);
    background:#fff;color:var(--ink);cursor:pointer;transition:background .15s;}
  button:hover{background:#f0efe8;}
  .controls{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
  .controls .hint{font-size:12px;color:var(--muted);}
  .legend{display:flex;flex-wrap:wrap;gap:8px 10px;margin-bottom:16px;font-size:12px;color:var(--muted);}
  .legend .item{display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;padding:3px 8px;border-radius:999px;border:1px solid var(--line);background:#fff;transition:opacity .15s,background .15s;}
  .legend .item:hover{background:#f0efe8;}
  .legend .item.off{opacity:.38;text-decoration:line-through;}
  .swatch{width:16px;height:3px;display:inline-block;border-radius:2px;}
  .swatch.dash{height:0;border-top:2px dashed;}
  .chart-box{position:relative;width:100%;height:460px;}
  footer{font-size:12px;color:var(--faint);margin-top:14px;}
  .state{font-size:13px;color:var(--muted);padding:40px 0;text-align:center;}
  .state.err{color:#b0322b;}
  #chartCard{display:none;}
</style>
</head>
<body>
<div class="wrap">
  <h1>3K retention curve</h1>
  <p class="sub">Weekly go-live cohorts rolled into monthly retention lines (May &amp; June split early/late, October omitted). Auto-synced from Metabase every 3 hours &mdash; nothing to load.</p>

  <div class="card" id="loadingCard">
    <div class="state" id="state">Loading latest snapshot&hellip;</div>
  </div>

  <div class="card" id="chartCard">
    <div class="controls">
      <button id="showAll" type="button">Show all</button>
      <button id="hideAll" type="button">Hide all</button>
      <span class="hint">Click a cohort to hide or show its line</span>
    </div>
    <div class="legend" id="legend"></div>
    <div class="chart-box">
      <canvas id="chart" role="img" aria-label="Line chart of retention by weeks since go-live, one line per monthly cohort.">Retention by weeks since go-live.</canvas>
    </div>
    <footer id="foot"></footer>
  </div>
</div>

<script>
const MONTH=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const WCOLS=['W1','W2','W3','W4','W5','W6','W7'];
// fixed rollup settings (previously the checkboxes)
const OPTS={splitMay:true,omitOct:true,weighted:false,zeroBlank:false};
// stable, distinguishable palette; dashed flag for later months
const STYLE=[
  {c:'#185FA5'},{c:'#1D9E75'},{c:'#BA7517'},{c:'#D85A30'},{c:'#C0392B'},
  {c:'#D4537E',d:true},{c:'#534AB7',d:true},{c:'#2E8BC0',d:true},{c:'#5F5E5A',d:true},
  {c:'#7A6A00',d:true},{c:'#8E44AD',d:true},{c:'#16A085',d:true}
];

// ISO week (year, week) -> calendar month of that week's Monday (matches BigQuery %G-%V framing)
function isoWeekMonday(y,w){
  const simple=new Date(Date.UTC(y,0,1+(w-1)*7));
  const dow=simple.getUTCDay();
  const monday=new Date(simple);
  const diff=(dow<=4?dow-1:dow-8); // ISO: week containing first Thursday
  monday.setUTCDate(simple.getUTCDate()-diff);
  return monday;
}
function parseCohort(raw){
  raw=raw.trim();
  let y,w;
  let m=raw.match(/^(\d{4})[-_ ]?W?(\d{1,2})$/i);
  if(m){y=+m[1];w=+m[2];}
  else if(/^\d{6}$/.test(raw)){y=+raw.slice(0,4);w=+raw.slice(4);}
  else return null;
  const mon=isoWeekMonday(y,w);
  return {y,w,my:mon.getUTCFullYear(),mm:mon.getUTCMonth()+1};
}
function parseCSV(text){
  const lines=text.replace(/\r/g,'').split('\n').map(l=>l.trim()).filter(l=>l.length);
  if(lines.length<2) throw new Error('Snapshot has no data rows.');
  const header=lines[0].split(',').map(h=>h.trim());
  const idx={};header.forEach((h,i)=>idx[h.toLowerCase()]=i);
  if(!('cohort' in idx)) throw new Error('No "Cohort" column in snapshot.');
  const wIdx=WCOLS.map(w=>idx[w.toLowerCase()]);
  if(wIdx.some(i=>i===undefined)) throw new Error('Missing one or more of W1..W7 columns.');
  const glIdx=idx['go-lives'];
  const rows=[];
  for(let li=1;li<lines.length;li++){
    const parts=lines[li].split(',');
    const co=parseCohort(parts[idx.cohort]);
    if(!co) continue;
    const vals=wIdx.map(i=>{const v=(parts[i]||'').trim().replace('%','');return v===''?null:parseFloat(v);});
    const gl=glIdx!==undefined?parseFloat((parts[glIdx]||'').replace(/[^0-9.]/g,''))||0:1;
    rows.push({co,vals,gl});
  }
  if(!rows.length) throw new Error('No rows with a recognizable cohort value.');
  return rows;
}

function rollup(rows,opts){
  // group key: month, with May optionally split by ISO week (<=20 early, >=21 late)
  const groups={}; // key -> {label, order, weeks:[...]}
  for(const r of rows){
    if(opts.omitOct && r.co.mm===10) continue;
    let key,label,order;
    const isMay=r.co.mm===5;
    const isJun=r.co.mm===6;
    if(isMay && opts.splitMay){
      const early=r.co.w<=20;
      key=`${r.co.my}-05-${early?'E':'L'}`;
      label=`${early?'Early':'Late'} May ${String(r.co.my).slice(2)}`;
      order=r.co.my*100+5+(early?0:0.5);
    }else if(isJun && opts.splitMay){
      // mid-month: early = W23/W24 (Jun 1–14), late = W25+ (Jun 15 onward)
      const early=r.co.w<=24;
      key=`${r.co.my}-06-${early?'E':'L'}`;
      label=`${early?'Early':'Late'} Jun ${String(r.co.my).slice(2)}`;
      order=r.co.my*100+6+(early?0:0.5);
    }else{
      key=`${r.co.my}-${String(r.co.mm).padStart(2,'0')}`;
      label=`${MONTH[r.co.mm-1]} ${String(r.co.my).slice(2)}`;
      order=r.co.my*100+r.co.mm;
    }
    (groups[key]=groups[key]||{label,order,weeks:[]}).weeks.push(r);
  }
  const out=Object.values(groups).sort((a,b)=>a.order-b.order);
  for(const g of out){
    g.data=WCOLS.map((_,wi)=>{
      let num=0,den=0;
      for(const r of g.weeks){
        let v=r.vals[wi];
        if(v===null||v===undefined||isNaN(v)) continue;
        if(opts.zeroBlank && v===0) continue;
        const wt=opts.weighted?r.gl:1;
        num+=v*wt;den+=wt;
      }
      return den?Math.round(num/den*10)/10:null;
    });
    // omit W5 (index 4) and W6 (index 5) for the May lines — tail not reliably mature
    if(/May/.test(g.label)){ g.data[4]=null; g.data[5]=null; }
    g.n=g.weeks.length;
  }
  return out;
}

let chart=null;
function render(groups,meta){
  const ds=groups.map((g,i)=>{
    const st=STYLE[i%STYLE.length];
    return {label:g.label,data:g.data,borderColor:st.c,backgroundColor:st.c,
      borderWidth:2,borderDash:st.d?[6,3]:[],tension:0.3,pointRadius:2,pointHoverRadius:5,spanGaps:false};
  });
  if(chart) chart.destroy();
  chart=new Chart(document.getElementById('chart'),{
    type:'line',
    data:{labels:WCOLS,datasets:ds},
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.dataset.label+': '+(c.parsed.y==null?'—':c.parsed.y+'%')}}},
      scales:{
        y:{beginAtZero:true,ticks:{callback:v=>v+'%',font:{size:11}},grid:{color:'rgba(18,19,15,0.09)'},title:{display:true,text:'Retention'}},
        x:{ticks:{font:{size:12}},grid:{display:false},title:{display:true,text:'Weeks since go-live'}}
      }
    }
  });
  // legend
  const L=document.getElementById('legend');L.innerHTML='';
  ds.forEach((d,i)=>{
    const it=document.createElement('span');it.className='item';
    const sw=document.createElement('span');sw.className='swatch'+(d.borderDash.length?' dash':'');
    if(d.borderDash.length)sw.style.borderColor=d.borderColor;else sw.style.background=d.borderColor;
    it.appendChild(sw);it.appendChild(document.createTextNode(d.label));
    it.addEventListener('click',()=>{const v=chart.isDatasetVisible(i);chart.setDatasetVisibility(i,!v);it.classList.toggle('off',v);chart.update();});
    L.appendChild(it);
  });
  const setAll=v=>{ds.forEach((_,i)=>chart.setDatasetVisibility(i,v));chart.update();[...L.children].forEach(e=>e.classList.toggle('off',!v));};
  document.getElementById('showAll').onclick=()=>setAll(true);
  document.getElementById('hideAll').onclick=()=>setAll(false);
  const thin=groups.filter(g=>g.n<=2).map(g=>g.label);
  let foot='Hover any week to compare cohorts.'+(thin.length?' Thin data (≤2 weeks): '+thin.join(', ')+'.':'');
  if(meta&&meta.generated_at){
    const d=new Date(meta.generated_at);
    if(!isNaN(d)) foot+=' Last synced '+d.toLocaleString(undefined,{dateStyle:'medium',timeStyle:'short'})+'.';
  }
  document.getElementById('foot').textContent=foot;
  document.getElementById('loadingCard').style.display='none';
  document.getElementById('chartCard').style.display='block';
}

function fail(m){
  const s=document.getElementById('state');
  s.className='state err';
  s.textContent=m;
}

async function load(){
  try{
    // cache-bust so a long-open tab always sees the freshest committed snapshot
    const res=await fetch('data.json?ts='+Date.now(),{cache:'no-store'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const snap=await res.json();
    const csv=typeof snap==='string'?snap:snap.csv;
    if(!csv) throw new Error('Snapshot missing CSV payload.');
    const groups=rollup(parseCSV(csv),OPTS);
    if(!groups.length) throw new Error('Nothing to plot after grouping.');
    render(groups,snap);
  }catch(e){
    fail('Could not load the retention snapshot ('+e.message+'). It refreshes automatically every 3 hours; try reloading shortly.');
  }
}
window.addEventListener('load',load);
// keep a long-lived tab fresh without a manual reload (snapshot changes at most every 3h)
setInterval(load,30*60*1000);
</script>
</body>
</html>
