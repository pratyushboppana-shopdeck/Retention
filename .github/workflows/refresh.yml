name: Refresh retention snapshot

on:
  schedule:
    - cron: '0 */3 * * *'   # every 3 hours (UTC)
  workflow_dispatch:          # allow a manual run from the Actions tab

# contents: commit the snapshot; pages/id-token: deploy in the same run
# (a GITHUB_TOKEN commit does NOT trigger the separate deploy workflow, so we deploy here).
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch latest data from Metabase
        env:
          METABASE_URL: https://metabase.kaip.in
          METABASE_USER_EMAIL: ${{ secrets.METABASE_USER_EMAIL }}
          METABASE_PASSWORD: ${{ secrets.METABASE_PASSWORD }}
        run: python .github/scripts/refresh.py

      - name: Commit snapshot if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data.json; then
            echo "No change in data.json — nothing to commit."
          else
            git add data.json
            git commit -m "Auto-refresh retention snapshot"
            git push
          fi

      # Publish the freshly-generated working tree straight to Pages.
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
